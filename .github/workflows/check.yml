name: Check MOTUS version

on:
  schedule:
    - cron: "0 * * * *" # hourly; dial back once the deploy cadence is clear
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: motus-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Check MOTUS version
        id: check
        continue-on-error: true
        run: bun run check

      # Commit ONLY when a real version change is detected, so the git log stays a
      # clean list of actual MOTUS deploys. Heartbeat-only latest.json changes are discarded.
      - name: Commit on real change
        run: |
          if [ -n "$(git status --porcelain data/versions.ndjson README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/versions.ndjson data/latest.json README.md
            git commit -m "chore: MOTUS version change detected [skip ci]"
            git push
          else
            echo "No version change detected."
            git checkout -- data/latest.json 2>/dev/null || true
          fi

      - name: Surface check failure
        if: steps.check.outcome == 'failure'
        run: |
          echo "::error::MOTUS version check failed — see logs above."
          exit 1
